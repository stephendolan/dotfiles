- clean:
    - "~"
    - "~/.config"
    - "~/.config/opencode"
    - "~/.zsh"
    - "~/.claude"
    - "~/Library/Application Support/Claude"

- defaults:
    link:
      create: true
      relink: true
    shell:
      stderr: true
      quiet: true

- link:
    # Git configuration
    ~/.gitconfig: git/config
    ~/.gitignore_global: git/ignore_global

    # Shell configuration
    ~/.tmux.conf: shell/tmux.conf
    ~/.zshrc: shell/config
    ~/.aliases: shell/aliases
    ~/.zsh/config/fzf: shell/zsh/fzf
    ~/.zsh/config/mac:
      if: "[ `uname` = Darwin ]"
      path: shell/zsh/mac
    ~/.zsh/config/linux:
      if: "[ `uname` = Linux ]"
      path: shell/zsh/linux
    ~/.zsh/config/ripgrep: shell/zsh/ripgrep
    ~/.zsh/functions/ai: shell/functions/ai

    # XDG-compatible applications
    ~/.config/nvim:
      path: nvim
      force: true
    ~/.config/starship.toml: starship/config.toml
    ~/.config/atuin/config.toml: atuin/config.toml
    ~/.config/bat/config: bat/config
    ~/Library/Application Support/com.mitchellh.ghostty/config:
      if: "[ `uname` = Darwin ]"
      path: ghostty/config
    ~/.config/ghostty/config:
      if: "[ `uname` = Linux ]"
      path: ghostty/config

    # Database tools
    ~/.psqlrc: psql/config
    ~/.pspgconf: pspg/config

    # Development tools
    ~/.asdfrc: asdf/config
    ~/.tool-versions: asdf/tool-versions
    ~/.railsrc: rails/default_flags

    # Search tools
    ~/.ripgreprc: ripgrep/config
    ~/.rgignore: ripgrep/ignore

    # AI tools configuration
    # Claude Code (native) + OpenCode (via oh-my-opencode plugin reading ~/.claude/)
    ~/.claude/CLAUDE.md: ai/AGENTS.md
    ~/.claude/settings.json: ai/claude-settings.json
    ~/.claude/agents: ai/agents
    ~/.claude/commands: ai/commands
    ~/.claude/skills: ai/skills
    ~/.claude/hooks: ai/hooks
    ~/.config/opencode/opencode.json: ai/opencode/config.json

- shell:
    - [./scripts/dotbot-setup.sh, Setting up DotBot]
    - command: ./scripts/apt-install.sh
      description: Installing apt packages
      stdin: true
      stdout: true
      if: "[ `uname` = Linux ]"
    - [./scripts/brew-setup.sh, Setting up Homebrew and packages]
    - [./ai/generate-mcp.sh, Generating MCP configs]
    - [./scripts/claude-code-setup.sh, Setting up Claude Code]
    - [./scripts/opencode-setup.sh, Setting up OpenCode]
    - [./scripts/shell-setup.sh, Setting up default shell]
    - [./scripts/asdf-setup.sh, Setting up ASDF plugins and versions]
