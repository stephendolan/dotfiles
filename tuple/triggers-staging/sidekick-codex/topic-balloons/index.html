<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Topic Balloons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #ffd6a5;
      color: #2d2548;
      font-family: "Fredoka", system-ui, sans-serif;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: pointer;
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Topic Balloons live call memory game"></canvas>
  <script src="data.js"></script>
  <script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const tau = Math.PI * 2;
  const balloons = new Map();
  const particles = [];
  const rings = [];
  const notes = [];
  const remembered = new Set(JSON.parse(localStorage.topicBalloonsRemembered || "[]"));
  let w = 0;
  let h = 0;
  let last = performance.now();
  let stamp = "";
  let pulse = "listening for the shape of the conversation";
  let live = true;
  let score = Number(localStorage.topicBalloonsScore || 0);
  let audio = null;

  const colors = {
    key_point: ["#58c7f3", "#d7f6ff", "#1c83bd"],
    decision: ["#80e38f", "#e0ffe2", "#23985c"],
    question: ["#ffd166", "#fff1aa", "#cf8618"],
    risk: ["#ff7a90", "#ffd0d8", "#b9385b"],
    action: ["#b694ff", "#efe4ff", "#6a4cc2"],
    term: ["#5de0c7", "#d9fff7", "#238f85"]
  };
  const kindLabel = {
    key_point: "key point",
    decision: "decision",
    question: "open question",
    risk: "risk",
    action: "action",
    term: "term"
  };

  function resize() {
    w = Math.floor(innerWidth);
    h = Math.floor(innerHeight);
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function rand(min, max) {
    return min + Math.random() * (max - min);
  }

  function hash(value) {
    let out = 0;
    for (let i = 0; i < value.length; i++) out = (out * 33 + value.charCodeAt(i)) | 0;
    return Math.abs(out);
  }

  function radiusFor(item) {
    return Math.min(122, 52 + Math.sqrt(Math.max(1, item.weight || 1)) * 18);
  }

  function normItem(raw) {
    const label = String(raw.label || raw.word || "").trim();
    if (!label) return null;
    const id = String(raw.id || label.toLowerCase().replace(/[^a-z0-9]+/g, "-"));
    return {
      id,
      label,
      kind: raw.kind || "key_point",
      weight: Number(raw.weight || raw.count || 1),
      prompt: raw.prompt || `What matters about ${label}?`,
      summary: raw.summary || "",
      status: raw.status || ""
    };
  }

  function spawn(item) {
    const old = balloons.get(item.id);
    const target = radiusFor(item);
    if (old) {
      const grew = item.weight > old.item.weight;
      old.item = item;
      old.target = target;
      if (grew) old.wobble = 1.25;
      return;
    }
    const seed = hash(item.id);
    const palette = colors[item.kind] || colors.key_point;
    balloons.set(item.id, {
      item,
      x: rand(target + 26, Math.max(target + 26, w - target - 26)),
      y: rand(h * 0.22, Math.max(h * 0.24, h * 0.72)),
      vx: ((seed % 23) - 11) * 0.8,
      vy: (((seed >> 3) % 17) - 8) * 0.55,
      r: target * 0.52,
      target,
      phase: rand(0, tau),
      tilt: rand(-0.06, 0.06),
      wobble: 1,
      colors: palette
    });
  }

  function syncData() {
    const data = window.__CALL_DATA__ || {};
    live = data.live !== false;
    pulse = data.pulse || pulse;
    if (data.updatedAt && data.updatedAt === stamp) return;
    stamp = data.updatedAt || String(Date.now());
    const rawItems = Array.isArray(data.items) ? data.items : data.words || [];
    const items = rawItems.map(normItem).filter(Boolean).slice(0, 8);
    const keep = new Set();
    for (const item of items) {
      keep.add(item.id);
      if (!remembered.has(item.id) || item.status === "changed" || item.status === "open") spawn(item);
    }
    for (const id of balloons.keys()) {
      if (!keep.has(id) || remembered.has(id)) balloons.delete(id);
    }
  }

  function reloadData() {
    const old = document.querySelector("script[data-call-data]");
    if (old) old.remove();
    const script = document.createElement("script");
    script.src = "data.js?t=" + Date.now();
    script.dataset.callData = "true";
    script.onload = syncData;
    document.head.appendChild(script);
  }

  function unlockAudio() {
    if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)();
    if (audio.state === "suspended") audio.resume();
  }

  function playPop(x) {
    if (!audio) return;
    const t = audio.currentTime;
    const osc = audio.createOscillator();
    const gain = audio.createGain();
    osc.type = "triangle";
    osc.frequency.setValueAtTime(460 + (x / Math.max(1, w)) * 320, t);
    osc.frequency.exponentialRampToValueAtTime(128, t + 0.09);
    gain.gain.setValueAtTime(0.001, t);
    gain.gain.exponentialRampToValueAtTime(0.18, t + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(gain);
    gain.connect(audio.destination);
    osc.start(t);
    osc.stop(t + 0.16);
  }

  function remember(balloon) {
    remembered.add(balloon.item.id);
    localStorage.topicBalloonsRemembered = JSON.stringify(Array.from(remembered));
    score += 1;
    localStorage.topicBalloonsScore = String(score);
    balloons.delete(balloon.item.id);
    notes.push({
      x: balloon.x,
      y: balloon.y - balloon.r * 0.28,
      text: balloon.item.summary || balloon.item.label,
      color: balloon.colors[2],
      life: 3.8,
      age: 0
    });
    burst(balloon.x, balloon.y, balloon.r, balloon.colors);
    playPop(balloon.x);
  }

  function burst(x, y, r, palette) {
    rings.push({ x, y, r: r * 0.35, life: 0.58, max: r * 2.25 });
    for (let i = 0; i < 48; i++) {
      const a = rand(0, tau);
      const speed = rand(100, 430);
      particles.push({
        x: x + Math.cos(a) * r * 0.25,
        y: y + Math.sin(a) * r * 0.18,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed - rand(60, 190),
        size: rand(4, 10),
        rot: rand(0, tau),
        vr: rand(-8, 8),
        life: rand(0.55, 1.1),
        color: i % 3 === 0 ? palette[1] : colors[Object.keys(colors)[i % 6]][0]
      });
    }
  }

  function hit(x, y) {
    const list = Array.from(balloons.values()).sort((a, b) => b.r - a.r);
    for (const b of list) {
      const dx = (x - b.x) / (b.r * 0.94);
      const dy = (y - b.y) / (b.r * 1.06);
      if (dx * dx + dy * dy <= 1) return b;
    }
    return null;
  }

  function pointer(ev) {
    unlockAudio();
    const p = ev.touches ? ev.touches[0] : ev;
    const rect = canvas.getBoundingClientRect();
    const x = p.clientX - rect.left;
    const y = p.clientY - rect.top;
    const target = hit(x, y);
    if (target) remember(target);
  }

  function update(dt, t) {
    for (const b of balloons.values()) {
      b.r += (b.target - b.r) * 8 * dt;
      b.wobble *= Math.pow(0.08, dt);
      b.x += (b.vx + Math.sin(t * 0.25 + b.phase) * 10) * dt;
      b.y += (b.vy + Math.cos(t * 0.21 + b.phase) * 5) * dt;
      const pad = b.r + 24;
      if (b.x < pad || b.x > w - pad) b.vx *= -1;
      if (b.y < h * 0.18 || b.y > h - b.r * 1.8) b.vy *= -1;
      b.x = Math.max(pad, Math.min(w - pad, b.x));
      b.y = Math.max(h * 0.18, Math.min(h - b.r * 1.8, b.y));
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      p.vy += 560 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rot += p.vr * dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = rings.length - 1; i >= 0; i--) {
      const r = rings[i];
      r.life -= dt;
      r.r += r.max * dt * 2;
      if (r.life <= 0) rings.splice(i, 1);
    }
    for (let i = notes.length - 1; i >= 0; i--) {
      const note = notes[i];
      note.age += dt;
      note.life -= dt;
      note.y -= 18 * dt;
      if (note.life <= 0) notes.splice(i, 1);
    }
  }

  function drawSky(t) {
    const day = (Math.sin(t * 0.035) + 1) / 2;
    const g = ctx.createLinearGradient(0, 0, w, h);
    g.addColorStop(0, mix("#ffd7a6", "#95d9ff", day));
    g.addColorStop(0.5, mix("#ffadc4", "#baf0df", day));
    g.addColorStop(1, mix("#a58bd6", "#fac2e7", day));
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
    ctx.save();
    ctx.globalAlpha = 0.34;
    ctx.filter = "blur(22px)";
    for (let i = 0; i < 7; i++) {
      const x = ((i * 270 + t * (11 + i * 1.6)) % (w + 360)) - 180;
      const y = h * (0.15 + (i % 4) * 0.16) + Math.sin(t * 0.2 + i) * 18;
      drawCloud(x, y, 78 + i * 9);
    }
    ctx.restore();
    const floor = ctx.createLinearGradient(0, h * 0.74, 0, h);
    floor.addColorStop(0, "rgba(255,255,255,0)");
    floor.addColorStop(1, "rgba(255,255,255,0.2)");
    ctx.fillStyle = floor;
    ctx.fillRect(0, h * 0.74, w, h * 0.26);
  }

  function mix(a, b, amt) {
    const pa = parseInt(a.slice(1), 16);
    const pb = parseInt(b.slice(1), 16);
    const ar = pa >> 16, ag = (pa >> 8) & 255, ab = pa & 255;
    const br = pb >> 16, bg = (pb >> 8) & 255, bb = pb & 255;
    return `rgb(${Math.round(ar + (br - ar) * amt)}, ${Math.round(ag + (bg - ag) * amt)}, ${Math.round(ab + (bb - ab) * amt)})`;
  }

  function drawCloud(x, y, s) {
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(x, y, s * 0.42, 0, tau);
    ctx.arc(x + s * 0.42, y - s * 0.18, s * 0.52, 0, tau);
    ctx.arc(x + s * 0.95, y, s * 0.38, 0, tau);
    ctx.arc(x + s * 0.48, y + s * 0.18, s * 0.5, 0, tau);
    ctx.fill();
  }

  function drawString(b, x, y) {
    ctx.save();
    ctx.strokeStyle = b.colors[2];
    ctx.globalAlpha = 0.65;
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    const top = y + b.r * 0.78;
    ctx.moveTo(x, top);
    for (let i = 1; i <= 18; i++) {
      const p = i / 18;
      ctx.lineTo(x + Math.sin(b.phase + p * 9) * 7 * (1 - p * 0.2), top + p * b.r * 1.18);
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawBalloon(b, t) {
    const bob = Math.sin(t * 1.45 + b.phase) * 8;
    const wob = Math.sin(t * 12 + b.phase) * b.wobble * 0.045;
    const x = b.x;
    const y = b.y + bob;
    drawString(b, x, y);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.sin(t * 0.8 + b.phase) * 0.035 + b.tilt);
    ctx.scale(1 + wob, 1 - wob * 0.55);
    const body = ctx.createRadialGradient(-b.r * 0.38, -b.r * 0.45, b.r * 0.08, 0, 0, b.r * 1.25);
    body.addColorStop(0, b.colors[1]);
    body.addColorStop(0.23, b.colors[0]);
    body.addColorStop(1, b.colors[2]);
    ctx.shadowColor = "rgba(70, 42, 112, 0.24)";
    ctx.shadowBlur = 25;
    ctx.shadowOffsetY = 12;
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.ellipse(0, 0, b.r * 0.9, b.r * 1.04, 0, 0, tau);
    ctx.fill();
    ctx.shadowColor = "transparent";
    ctx.fillStyle = "rgba(255,255,255,0.52)";
    ctx.beginPath();
    ctx.ellipse(-b.r * 0.34, -b.r * 0.42, b.r * 0.18, b.r * 0.3, -0.55, 0, tau);
    ctx.fill();
    ctx.fillStyle = b.colors[2];
    ctx.beginPath();
    ctx.moveTo(-b.r * 0.16, b.r * 0.91);
    ctx.quadraticCurveTo(0, b.r * 1.1, b.r * 0.16, b.r * 0.91);
    ctx.closePath();
    ctx.fill();
    drawLabel(b);
    ctx.restore();
  }

  function drawLabel(b) {
    const recall = b.item.label || b.item.prompt;
    const label = fitText(recall, b.r * 1.35, 24, 14);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = `700 ${label.size}px Fredoka, sans-serif`;
    ctx.lineWidth = 7;
    ctx.strokeStyle = "rgba(255,255,255,0.66)";
    ctx.fillStyle = "#30254d";

    const labelWidth = b.r * 1.25;
    const lineHeight = label.size * 1.05;
    const lines = wrapLines(label.text, labelWidth, 3);
    const badge = kindLabel[b.item.kind] || "topic";
    const badgeTop = -b.r * 0.76;
    const badgeH = 28;
    const badgeGap = 12;
    const labelHalfH = ((lines.length - 1) * lineHeight + label.size) / 2;
    const minLabelY = badgeTop + badgeH + badgeGap + labelHalfH;
    const labelY = Math.max(-b.r * 0.04, minLabelY);

    wrapText(label.text, 0, labelY, labelWidth, lineHeight, true, 3);
    ctx.font = "700 16px Fredoka, sans-serif";
    const bw = Math.min(b.r * 1.24, ctx.measureText(badge).width + 22);
    ctx.fillStyle = "rgba(255,255,255,0.86)";
    roundRect(-bw / 2, badgeTop, bw, badgeH, 14);
    ctx.fill();
    ctx.fillStyle = "#5a3a85";
    ctx.fillText(badge, 0, badgeTop + badgeH / 2);
  }

  function fitText(text, maxWidth, max, min) {
    let size = max;
    while (size > min) {
      ctx.font = `700 ${size}px Fredoka, sans-serif`;
      if (ctx.measureText(text).width < maxWidth || text.includes(" ")) break;
      size -= 1;
    }
    return { text, size };
  }

  function wrapText(text, x, y, maxWidth, lineHeight, stroke, maxLines = Infinity) {
    const lines = wrapLines(text, maxWidth, maxLines);
    const start = y - (lines.length - 1) * lineHeight / 2;
    for (let i = 0; i < lines.length; i++) {
      if (stroke) ctx.strokeText(lines[i], x, start + i * lineHeight);
      ctx.fillText(lines[i], x, start + i * lineHeight);
    }
  }

  function drawEffects() {
    for (const r of rings) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, r.life / 0.58);
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r, 0, tau);
      ctx.stroke();
      ctx.restore();
    }
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, p.life));
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.62);
      ctx.restore();
    }
    for (const note of notes) {
      drawContextNote(note);
    }
  }

  function drawContextNote(note) {
    const alpha = Math.min(1, note.life / 0.7, note.age / 0.18);
    ctx.save();
    ctx.globalAlpha = alpha;
    const fontSize = Math.max(15, Math.min(19, Math.floor(w / 24)));
    const lineHeight = fontSize + 4;
    const padX = 24;
    const padY = 17;
    ctx.font = `600 ${fontSize}px Fredoka, sans-serif`;
    const maxWidth = Math.min(560, w - 28);
    const maxLines = Math.max(3, Math.floor((h - 32 - padY * 2) / lineHeight));
    const lines = wrapLines(note.text, maxWidth - padX * 2, maxLines);
    const textW = lines.length ? Math.max(...lines.map(line => ctx.measureText(line).width)) : 0;
    const cardW = Math.min(maxWidth, Math.max(250, textW + padX * 2));
    const cardH = padY * 2 + lines.length * lineHeight;
    const x = Math.max(14, Math.min(w - cardW - 14, note.x - cardW / 2));
    const y = Math.max(12, Math.min(h - cardH - 12, note.y - note.age * 18));
    ctx.shadowColor = "rgba(38, 28, 68, 0.2)";
    ctx.shadowBlur = 24;
    ctx.shadowOffsetY = 10;
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    roundRect(x, y, cardW, cardH, 18);
    ctx.fill();
    ctx.shadowColor = "transparent";
    ctx.fillStyle = "#372b56";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const startY = y + padY + lineHeight / 2;
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], x + cardW / 2, startY + i * lineHeight);
    }
    ctx.restore();
  }

  function wrapLines(text, maxWidth, maxLines = Infinity) {
    const words = String(text || "").trim().split(/\s+/).filter(Boolean);
    const lines = [];
    let line = "";
    let truncated = false;
    const limited = Number.isFinite(maxLines);
    for (const word of words) {
      const next = line ? line + " " + word : word;
      if (ctx.measureText(next).width > maxWidth && line) {
        lines.push(line);
        line = word;
        if (limited && lines.length >= maxLines) {
          truncated = true;
          break;
        }
      } else {
        line = next;
      }
    }
    if (!truncated && line) {
      if (limited && lines.length >= maxLines) truncated = true;
      else lines.push(line);
    }
    if (truncated && lines.length) lines[lines.length - 1] = ellipsize(lines[lines.length - 1], maxWidth);
    return lines;
  }

  function ellipsize(text, maxWidth) {
    let out = String(text || "").replace(/[.…\s]+$/, "") + "…";
    while (out.length > 1 && ctx.measureText(out).width > maxWidth) {
      out = out.slice(0, -2).trimEnd() + "…";
    }
    return out;
  }

  function drawHud(t) {
    ctx.save();
    ctx.textBaseline = "middle";
    ctx.font = "700 25px Fredoka, sans-serif";
    ctx.fillStyle = "rgba(255,255,255,0.78)";
    roundRect(22, 20, 258, 52, 26);
    ctx.fill();
    ctx.fillStyle = live ? "#ff3566" : "#8c8498";
    ctx.beginPath();
    ctx.arc(50, 46, 7 + Math.sin(t * 6) * (live ? 2 : 0), 0, tau);
    ctx.fill();
    ctx.fillStyle = "#30234d";
    ctx.fillText("Topic Balloons", 68, 47);
    const scoreText = `Recalled ${score}`;
    ctx.font = "700 23px Fredoka, sans-serif";
    const scoreW = ctx.measureText(scoreText).width + 44;
    ctx.fillStyle = "rgba(255,255,255,0.78)";
    roundRect(w - scoreW - 22, 20, scoreW, 52, 26);
    ctx.fill();
    ctx.fillStyle = "#30234d";
    ctx.textAlign = "center";
    ctx.fillText(scoreText, w - scoreW / 2 - 22, 47);
    ctx.restore();
  }

  function roundRect(x, y, width, height, radius) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.arcTo(x + width, y, x + width, y + height, radius);
    ctx.arcTo(x + width, y + height, x, y + height, radius);
    ctx.arcTo(x, y + height, x, y, radius);
    ctx.arcTo(x, y, x + width, y, radius);
    ctx.closePath();
  }

  function frame(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    const t = now / 1000;
    last = now;
    update(dt, t);
    drawSky(t);
    for (const b of Array.from(balloons.values()).sort((a, b) => a.y - b.y)) drawBalloon(b, t);
    drawEffects();
    drawHud(t);
    requestAnimationFrame(frame);
  }

  addEventListener("resize", resize);
  canvas.addEventListener("pointerdown", pointer);
  canvas.addEventListener("touchstart", pointer, { passive: true });
  resize();
  syncData();
  setInterval(reloadData, 1500);
  requestAnimationFrame(frame);
})();
  </script>
</body>
</html>
